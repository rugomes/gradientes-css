<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meu Projeto de Gradientes</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;

      background: linear-gradient(
        to left,
        #F20775,
        #D91EA7,
        #F29B30,
        #F26D3D,
        #F25244
      );
    }

    .container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      color: white;
      width: 300px;
    }

    h1 {
      margin-bottom: 15px;
    }

    p {
      margin-bottom: 20px;
      font-size: 14px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: white;
      color: #333;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: #f1f1f1;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🎨 Gradientes CSS</h1>
    <p>Explorando combinações de cores e efeitos visuais com CSS.</p>
    <button>Saiba mais</button>
  </div>
</body>
</html>
